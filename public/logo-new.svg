<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="40%" style="stop-color:#4C1D95"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="fGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E9D5FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Subtle top highlight -->
  <rect width="1024" height="512" rx="220" fill="white" opacity="0.04"/>
  <!-- Bold F lettermark -->
  <g filter="url(#shadow)">
    <!-- F vertical bar -->
    <rect x="280" y="230" width="110" height="564" rx="16" fill="url(#fGrad)"/>
    <!-- F top horizontal bar -->
    <rect x="280" y="230" width="440" height="110" rx="16" fill="url(#fGrad)"/>
    <!-- F middle horizontal bar -->
    <rect x="280" y="446" width="340" height="100" rx="16" fill="url(#fGrad)"/>
  </g>
</svg>
