<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160">
  <!-- Full background -->
  <rect width="720" height="160" fill="#FFFFFF" />

  <!-- Icon container -->
  <rect x="28" y="24" width="112" height="112" rx="22" fill="#0a0a0f" />

  <!-- F mark - vertical bar -->
  <rect x="54" y="43" width="18" height="74" rx="3" fill="#FFFFFF" />

  <!-- F top bar -->
