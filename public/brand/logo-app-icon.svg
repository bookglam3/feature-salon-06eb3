<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8C97A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)" />

  <!-- F mark - vertical bar -->
  <rect x="292" y="248" width="108" height="528" rx="18" fill="url(#fGrad)" />

  <!-- F mark - top horizontal bar (with notch: full width minus notch) -->
  <!-- Full top bar -->
  <rect x="292" y="248" width="440" height="108" rx="18" fill="url(#fGrad)" />
  <!-- Notch cut at top-right corner (architectural detail) -->
  <polygon points="656,248 732,248 732,356 620,248" fill="#0d0d12" />

  <!-- F mark - middle horizontal bar (shorter, classic F proportion) -->
  <rect x="292" y="458" width="312" height="96" rx="18" fill="url(#fGrad)" />

  <!-- Gold accent - thin bar at bottom of middle stroke -->
  <rect x="292" y="668" width="200" height="18" rx="9" fill="url(#goldGrad)" opacity="0.9" />
</svg>
