<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160">
  <defs>
    <linearGradient id="iconBgL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4f1ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ede8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8962E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF5A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Full background -->
  <rect width="720" height="160" fill="#FFFFFF" />

  <!-- Icon container -->
  <rect x="28" y="24" width="112" height="112" rx="22" fill="url(#iconBgL)" />

  <!-- F mark - vertical bar -->
  <rect x="54" y="43" width="18" height="74" rx="3" fill="url(#fGradL)" />

  <!-- F top bar -->
  <rect x="54" y="43" width="62" height="18" rx="3" fill="url(#fGradL)" />
  <!-- Notch -->
  <polygon points="102,43 116,43 116,61 90,43" fill="#ede8ff" />

  <!-- F middle bar -->
  <rect x="54" y="73" width="44" height="16" rx="3" fill="url(#fGradL)" />

  <!-- Gold accent -->
  <rect x="54" y="103" width="30" height="3" rx="1.5" fill="url(#goldL)" opacity="0.9" />

  <!-- Wordmark: "feature" -->
  <text
    x="162"
    y="93"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="46"
    font-weight="600"
    letter-spacing="-1.5"
    fill="#0a0a0f"
  >feature</text>

  <!-- Tagline -->
  <text
    x="164"
    y="118"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="3.5"
    fill="#7C3AED"
  >SALON MANAGEMENT</text>
</svg>
